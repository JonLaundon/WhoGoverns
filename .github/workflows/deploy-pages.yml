# Deploy the static site to GitHub Pages. Serves the whole repo root, so the root index.html
# (which redirects to /site/) and the map's fetch of /compiled/graph.json both resolve.
# One-time setup: repo Settings -> Pages -> Source -> "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .        # the repo root — keeps /site/ and /compiled/ at their expected paths
      - id: deployment
        uses: actions/deploy-pages@v4
